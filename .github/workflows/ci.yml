name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Scala 3.6.4 compiler requires JDK 21+; bytecode targets Java 17 via javacOptions
        java: [21]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: sbt

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Compile (all Scala versions)
        run: sbt +compile

      - name: Run tests (all Scala versions)
        run: sbt +test

      - name: Generate Scaladoc (all Scala versions)
        run: sbt +doc

      - name: Check formatting
        run: sbt scalafmtCheckAll
